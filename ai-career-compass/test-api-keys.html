<!DOCTYPE html>
<html>
<head>
    <title>Test API Keys</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #1a1a1a; color: #fff; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #444; border-radius: 5px; }
        .success { border-color: #4caf50; background: #1b5e20; }
        .error { border-color: #f44336; background: #b71c1c; }
        .pending { border-color: #ff9800; background: #e65100; }
        code { background: #333; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>API Key Tester</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        async function testGemini() {
            const key = 'YOUR_GEMINI_API_KEY_HERE'; // Add your key here
            const div = document.createElement('div');
            div.className = 'test pending';
            div.innerHTML = '<strong>Testing Gemini API...</strong>';
            results.appendChild(div);

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + key, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: 'Say hello' }]
                        }]
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    div.className = 'test success';
                    div.innerHTML = '<strong>✓ Gemini API Key is VALID</strong><br>Response: ' + JSON.stringify(data).substring(0, 100) + '...';
                } else {
                    div.className = 'test error';
                    div.innerHTML = '<strong>✗ Gemini API Key is INVALID</strong><br>Error: ' + (data.error?.message || JSON.stringify(data));
                }
            } catch (error) {
                div.className = 'test error';
                div.innerHTML = '<strong>✗ Gemini API Error</strong><br>' + error.message;
            }
        }

        async function testClaude() {
            const key = 'your_anthropic_api_key_here';
            const div = document.createElement('div');
            div.className = 'test pending';
            div.innerHTML = '<strong>Testing Claude API...</strong>';
            results.appendChild(div);

            if (key === 'your_anthropic_api_key_here') {
                div.className = 'test error';
                div.innerHTML = '<strong>✗ Claude API Key not configured</strong>';
                return;
            }

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': key,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-3-sonnet-20240229',
                        max_tokens: 100,
                        messages: [{ role: 'user', content: 'Say hello' }]
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    div.className = 'test success';
                    div.innerHTML = '<strong>✓ Claude API Key is VALID</strong>';
                } else {
                    div.className = 'test error';
                    div.innerHTML = '<strong>✗ Claude API Key is INVALID</strong><br>Error: ' + (data.error?.message || JSON.stringify(data));
                }
            } catch (error) {
                div.className = 'test error';
                div.innerHTML = '<strong>✗ Claude API Error</strong><br>' + error.message;
            }
        }

        async function testOpenAI() {
            const key = 'your_openai_api_key_here';
            const div = document.createElement('div');
            div.className = 'test pending';
            div.innerHTML = '<strong>Testing OpenAI API...</strong>';
            results.appendChild(div);

            if (key === 'your_openai_api_key_here') {
                div.className = 'test error';
                div.innerHTML = '<strong>✗ OpenAI API Key not configured</strong>';
                return;
            }

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + key
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: 'Say hello' }],
                        max_tokens: 100
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    div.className = 'test success';
                    div.innerHTML = '<strong>✓ OpenAI API Key is VALID</strong>';
                } else {
                    div.className = 'test error';
                    div.innerHTML = '<strong>✗ OpenAI API Key is INVALID</strong><br>Error: ' + (data.error?.message || JSON.stringify(data));
                }
            } catch (error) {
                div.className = 'test error';
                div.innerHTML = '<strong>✗ OpenAI API Error</strong><br>' + error.message;
            }
        }

        // Run tests
        testGemini();
        testClaude();
        testOpenAI();
    </script>
</body>
</html>
